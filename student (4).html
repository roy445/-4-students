<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四次模擬考 個人診斷評量</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7A30;--deep:#0D1117;--deep2:#161B22;--deep3:#21262D;--border:#30363D;--text:#E6EDF3;--muted:#8B949E;--red:#E05C5C;--green:#3FB950;--blue:#58A6FF;--orange:#F0883E;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--deep);color:var(--text);min-height:100vh;overflow-x:hidden;}
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(201,168,76,.1) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 80% 70%,rgba(88,166,255,.05) 0%,transparent 60%);}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);background-size:60px 60px;}
.login-box{position:relative;width:440px;background:var(--deep2);border:1px solid var(--border);border-radius:20px;padding:48px 44px;box-shadow:0 24px 80px rgba(0,0,0,.7);}
.login-logo{text-align:center;margin-bottom:36px;}
.login-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:100px;padding:6px 18px;font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.login-logo h1{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;line-height:1.4;}
.login-logo h1 span{color:var(--gold);}
.login-logo p{font-size:13px;color:var(--muted);margin-top:6px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.form-group input{width:100%;background:var(--deep3);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;outline:none;transition:all .2s;}
.form-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:10px;padding:14px;color:#1a1200;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px;margin-top:6px;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.35);}
.login-err{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:14px;display:none;}
#app{display:none;min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(13,17,23,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand h2{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;}
.brand span{font-size:11px;color:var(--muted);display:block;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--deep3);border:1px solid var(--border);border-radius:100px;padding:5px 14px 5px 6px;}
.avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1a1200;}
.user-chip span{font-size:13px;font-weight:500;}
.btn-out{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;}
.btn-out:hover{color:var(--red);border-color:var(--red);}
.nav{position:fixed;top:60px;left:0;right:0;background:var(--deep2);border-bottom:1px solid var(--border);display:flex;padding:0 24px;z-index:99;overflow-x:auto;gap:4px;}
.nav-tab{padding:14px 18px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;font-weight:500;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.content{margin-top:108px;padding:28px 24px;max-width:1100px;margin-left:auto;margin-right:auto;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--deep2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.card-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.card-title .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;flex-shrink:0;}
.card-sub{font-size:12px;color:var(--muted);font-weight:400;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:var(--deep3);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.stat-val{font-family:'DM Serif Display',serif;font-size:30px;}
.stat-info{font-size:11px;color:var(--muted);margin-top:4px;}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.sub-card{background:var(--deep3);border:1px solid var(--border);border-radius:14px;padding:22px;transition:border-color .2s;}
.sub-card:hover{border-color:rgba(201,168,76,.3);}
.sub-name{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.sub-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.row label{font-size:12px;color:var(--muted);width:70px;flex-shrink:0;}
.row input[type=number]{flex:1;background:var(--deep2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:'Noto Sans TC',sans-serif;}
.row input[type=number]:focus{border-color:var(--gold);}
.row .tot{font-size:12px;color:var(--muted);white-space:nowrap;}
.q-label{font-size:12px;color:var(--muted);margin:12px 0 8px;font-weight:500;}
.q-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.q-btn{width:34px;height:34px;border-radius:7px;background:var(--deep2);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
.q-btn:hover{border-color:rgba(201,168,76,.6);color:var(--gold);}
.q-btn.wrong{background:rgba(224,92,92,.18);border-color:var(--red)!important;color:var(--red)!important;}
.wrong-count{font-size:11px;color:var(--red);margin-top:4px;min-height:16px;line-height:1.4;}
.grade-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;margin-top:8px;}
.btn-save{width:100%;background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:10px;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:12px;font-family:'Noto Sans TC',sans-serif;}
.btn-save:hover{background:linear-gradient(135deg,rgba(201,168,76,.28),rgba(201,168,76,.1));}
.analysis-tbl{width:100%;border-collapse:collapse;}
.analysis-tbl th{background:var(--deep3);padding:11px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
.analysis-tbl td{padding:12px 14px;border-bottom:1px solid rgba(48,54,61,.5);font-size:13px;}
.analysis-tbl tr:hover td{background:rgba(255,255,255,.02);}
.bar-wrap{height:6px;background:var(--deep3);border-radius:3px;overflow:hidden;width:110px;}
.bar-fill{height:100%;border-radius:3px;}
.weak-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--deep3);border-radius:12px;margin-bottom:8px;border-left:3px solid var(--red);}
.weak-num{font-family:'DM Serif Display',serif;font-size:20px;color:rgba(224,92,92,.3);width:28px;flex-shrink:0;line-height:1;}
.weak-body h4{font-size:13px;font-weight:700;margin-bottom:3px;}
.weak-body p{font-size:11px;color:var(--muted);line-height:1.5;}
.weak-body .wr{font-size:11px;margin-top:3px;}
.unit-item{background:var(--deep3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;}
.unit-cnt{width:34px;height:34px;border-radius:7px;background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--red);flex-shrink:0;}
.unit-info h5{font-size:13px;font-weight:700;margin-bottom:2px;}
.unit-info p{font-size:11px;color:var(--muted);}
.unit-qs{font-size:11px;color:var(--red);margin-top:2px;}
.chart-wrap{display:flex;justify-content:center;padding:16px;}
.total-wrap{text-align:center;padding:24px;}
.total-wrap .big{font-family:'DM Serif Display',serif;font-size:68px;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;}
.total-wrap .sub{font-size:13px;color:var(--muted);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--deep2);border:1px solid var(--gold);border-radius:10px;padding:12px 18px;color:var(--text);font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{border-color:var(--red);}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--deep);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div id="loginPage">
  <div class="login-bg"></div><div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-badge">📊 第四次模擬考</div>
      <h1>個人診斷<span>評量中心</span></h1>
      <p>115學年度 國中教育會考模擬測驗</p>
    </div>
    <div class="login-err" id="loginErr">帳號或密碼錯誤，請再試一次</div>
    <div class="form-group"><label>帳號 ID</label><input type="text" id="uid" placeholder="請輸入帳號"></div>
    <div class="form-group"><label>密碼</label><input type="password" id="upwd" placeholder="請輸入密碼"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">登　入</button>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="brand"><div class="brand-icon">📊</div><div><h2>診斷評量中心</h2><span>第四次模擬考 · 115學年度</span></div></div>
    <div class="topbar-right">
      <div class="user-chip"><div class="avatar" id="uAvatar">–</div><span id="uName">–</span></div>
      <button class="btn-out" onclick="doLogout()">登出</button>
    </div>
  </div>
  <div class="nav">
    <div class="nav-tab active" onclick="showTab(this,'overview')">📈 成績總覽</div>
    <div class="nav-tab" onclick="showTab(this,'input')">✏️ 成績輸入</div>
    <div class="nav-tab" onclick="showTab(this,'analysis')">🔍 弱點分析</div>
  </div>
  <div class="content">
    <div id="section-overview" class="section active">
      <div class="card">
        <div class="card-title"><div class="dot"></div>本次模考成績</div>
        <div class="stat-grid" id="overviewGrid"><div style="color:var(--muted);font-size:14px;grid-column:1/-1;padding:16px 0;text-align:center">尚未輸入成績，請前往「成績輸入」</div></div>
      </div>
      <div class="two-col">
        <div class="card"><div class="card-title"><div class="dot"></div>五科雷達圖</div><div class="chart-wrap"><canvas id="radarChart" width="300" height="300"></canvas></div></div>
        <div class="card">
          <div class="card-title"><div class="dot"></div>五科等級一覽</div>
          <div class="total-wrap"><div class="big" id="topGrade">–</div><div class="sub" id="topSub">請輸入五科成績後查看</div></div>
          <table class="analysis-tbl" id="summaryTbl"></table>
        </div>
      </div>
    </div>
    <div id="section-input" class="section">
      <div class="card">
        <div class="card-title"><div class="dot"></div>成績輸入<span class="card-sub">　輸入答對題數，點選答錯的題號（紅色=答錯），再按儲存</span></div>
        <div class="sub-grid" id="subjectCards"></div>
      </div>
    </div>
    <div id="section-analysis" class="section">
      <div class="card"><div class="card-title"><div class="dot"></div>最需補強的科目</div><div id="weakList"><div style="color:var(--muted);font-size:14px;padding:16px 0;text-align:center">請先輸入成績</div></div></div>
      <div class="card"><div class="card-title"><div class="dot"></div>各科錯題單元分析</div><div id="unitList"><div style="color:var(--muted);font-size:14px;padding:16px 0;text-align:center">輸入錯題號後自動分析弱點單元</div></div></div>
      <div class="card">
        <div class="card-title"><div class="dot"></div>各科詳細答對率</div>
        <table class="analysis-tbl"><thead><tr><th>科目</th><th>答對/總題</th><th>答對率</th><th>等級</th><th>分佈</th></tr></thead><tbody id="detailBody"></tbody></table>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

function apiCall(p){return new Promise((res,rej)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const url=API+'?'+new URLSearchParams({...p,callback:cb}).toString();window[cb]=d=>{delete window[cb];document.getElementById(cb)?.remove();res(d);};const s=document.createElement('script');s.id=cb;s.src=url;s.onerror=()=>{delete window[cb];s.remove();rej(new Error('網路錯誤'));};setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();rej(new Error('逾時'));}},15000);document.head.appendChild(s);});}

async function doLogin(){
  const id=document.getElementById('uid').value.trim(),pw=document.getElementById('upwd').value.trim();
  if(!id||!pw)return;
  const btn=document.getElementById('loginBtn');btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  try{
    const r=await apiCall({action:'login',id,password:pw});
    if(r.success){
      if(r.user.isAdmin){toast('請使用管理員端登入',true);btn.innerHTML='登　入';btn.disabled=false;return;}
      CU=r.user;document.getElementById('loginErr').style.display='none';startApp();
    }else{document.getElementById('loginErr').style.display='block';}
  }catch(e){toast('連線失敗，請稍後再試',true);}
  btn.innerHTML='登　入';btn.disabled=false;
}
document.getElementById('upwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('uid').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function startApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uName').textContent=CU.name;
  document.getElementById('uAvatar').textContent=CU.name.charAt(0);
  buildCards();
  await loadSettings();
  await loadScores();
  renderOverview();renderAnalysis();
}

function doLogout(){
  CU=null;CS={};GS=null;
  if(RC){RC.destroy();RC=null;}
  // 完全清空錯題選取紀錄
  Object.keys(W).forEach(k=>delete W[k]);
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('uid').value='';document.getElementById('upwd').value='';
}

function showTab(el,name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');el.classList.add('active');
}

function mkQBtns(partKey,total){
  W[partKey]=W[partKey]||new Set();
  return Array.from({length:total},(_,i)=>i+1).map(n=>`<button class="q-btn" id="qb-${partKey}-${n}" onclick="tQ('${partKey}',${n})">${n}</button>`).join('');
}

function tQ(partKey,num){
  if(!W[partKey])W[partKey]=new Set();
  const btn=document.getElementById(`qb-${partKey}-${num}`);
  if(W[partKey].has(num)){W[partKey].delete(num);btn.classList.remove('wrong');}
  else{W[partKey].add(num);btn.classList.add('wrong');}
  updateWC(partKey);
}

function updateWC(partKey){
  const el=document.getElementById(`wc-${partKey}`);if(!el)return;
  const arr=[...W[partKey]].sort((a,b)=>a-b);
  el.textContent=arr.length?`已選 ${arr.length} 題答錯：${arr.join('、')} 題`:'';
}

function setWBtns(partKey,nums){
  if(!W[partKey])W[partKey]=new Set();
  W[partKey].clear();
  document.querySelectorAll(`[id^="qb-${partKey}-"]`).forEach(b=>b.classList.remove('wrong'));
  (nums||[]).forEach(n=>{W[partKey].add(n);const b=document.getElementById(`qb-${partKey}-${n}`);if(b)b.classList.add('wrong');});
  updateWC(partKey);
}

      <div class="sub-name"><div class="sub-icon" style="background:rgba(88,166,255,.15);color:var(--blue)">🔢</div>數學</div>
      <div class="row"><label>選擇答對</label><input type="number" id="mat_s" min="0" max="25" placeholder="0" oninput="liveG('math')"><span class="tot">/ 25題</span></div>
      <div class="row"><label>非選得分</label><input type="number" id="mat_o" min="0" max="6" step="0.5" placeholder="0" oninput="liveG('math')"><span class="tot">/ 6分</span></div>
      <div class="q-label">❌ 選擇題答錯題號</div>
      <div class="q-grid">${mkQBtns('math',25)}</div>
      <div class="wrong-count" id="wc-math"></div>
      <div id="g-math"></div>
      <button class="btn-save" onclick="saveSub('math')">儲存數學成績</button>
    </div>

    <div class="sub-card">
      <div class="sub-name"><div class="sub-icon" style="background:rgba(63,185,80,.15);color:var(--green)">🌐</div>英文</div>
      <div class="row"><label>閱讀答對</label><input type="number" id="eng_r" min="0" max="43" placeholder="0" oninput="liveG('english')"><span class="tot">/ 43題</span></div>
      <div class="q-label">❌ 閱讀答錯題號</div>
      <div class="q-grid">${mkQBtns('engRead',43)}</div>
      <div class="wrong-count" id="wc-engRead"></div>
      <div class="row" style="margin-top:12px"><label>聽力答對</label><input type="number" id="eng_l" min="0" max="21" placeholder="0" oninput="liveG('english')"><span class="tot">/ 21題</span></div>
      <div class="q-label">❌ 聽力答錯題號</div>
      <div class="q-grid">${mkQBtns('engListen',21)}</div>
      <div class="wrong-count" id="wc-engListen"></div>
      <div style="font-size:11px;color:var(--muted);margin:6px 0">加權 = (聽力÷21)×20 + (閱讀÷43)×80</div>
      <div id="g-english"></div>
      <button class="btn-save" onclick="saveSub('english')">儲存英文成績</button>
    </div>

    <div class="sub-card">
      <div class="sub-name"><div class="sub-icon" style="background:rgba(201,168,76,.15);color:var(--gold)">🌏</div>社會</div>
      <div class="row"><label>答對題數</label><input type="number" id="soc_c" min="0" max="54" placeholder="0" oninput="liveG('social')"><span class="tot">/ 54題</span></div>
      <div class="q-label">❌ 答錯的題號</div>
      <div class="q-grid">${mkQBtns('social',54)}</div>
      <div class="wrong-count" id="wc-social"></div>
      <div id="g-social"></div>
      <button class="btn-save" onclick="saveSub('social')">儲存社會成績</button>
    </div>

    <div class="sub-card">
      <div class="sub-name"><div class="sub-icon" style="background:rgba(138,180,248,.15);color:#8AB4F8">🔬</div>自然</div>
      <div class="row"><label>答對題數</label><input type="number" id="sci_c" min="0" max="50" placeholder="0" oninput="liveG('science')"><span class="tot">/ 50題</span></div>
      <div class="q-label">❌ 答錯的題號</div>
      <div class="q-grid">${mkQBtns('science',50)}</div>
      <div class="wrong-count" id="wc-science"></div>
      <div id="g-science"></div>
      <button class="btn-save" onclick="saveSub('science')">儲存自然成績</button>
    </div>
  `;
}

async function loadSettings(){try{const r=await apiCall({action:'getSettings'});if(r.success)GS=r.settings;}catch(e){}}
async function loadScores(){
  try{const r=await apiCall({action:'getScore',id:CU.id});if(r.success){CS=r.scores||{};fillF();}}catch(e){}
}

function fillF(){
  // 國文 - 無論有無成績都先清空
  document.getElementById('chi_c').value = CS.chinese ? (CS.chinese.correct||'') : '';
  setWBtns('chinese', CS.chinese ? (CS.chinese.wrong||[]) : []);
  if(CS.chinese) liveG('chinese'); else document.getElementById('g-chinese').innerHTML='';

  // 數學
  document.getElementById('mat_s').value = CS.math ? (CS.math.sel||'') : '';
  document.getElementById('mat_o').value = CS.math ? (CS.math.open||'') : '';
  setWBtns('math', CS.math ? (CS.math.wrong||[]) : []);
  if(CS.math) liveG('math'); else document.getElementById('g-math').innerHTML='';

  // 英文
  document.getElementById('eng_r').value = CS.english ? (CS.english.read||'') : '';
  document.getElementById('eng_l').value = CS.english ? (CS.english.listen||'') : '';
  setWBtns('engRead',   CS.english ? (CS.english.readWrong||[])   : []);
  setWBtns('engListen', CS.english ? (CS.english.listenWrong||[]) : []);
  if(CS.english) liveG('english'); else document.getElementById('g-english').innerHTML='';

  // 社會
  document.getElementById('soc_c').value = CS.social ? (CS.social.correct||'') : '';
  setWBtns('social', CS.social ? (CS.social.wrong||[]) : []);
  if(CS.social) liveG('social'); else document.getElementById('g-social').innerHTML='';

  // 自然
  document.getElementById('sci_c').value = CS.science ? (CS.science.correct||'') : '';
  setWBtns('science', CS.science ? (CS.science.wrong||[]) : []);
  if(CS.science) liveG('science'); else document.getElementById('g-science').innerHTML='';
}

function getG(sub,score){if(!GS||!GS[sub])return '–';for(const g of ['A++','A+','A','B++','B+','B','C']){const r=GS[sub][g];if(r&&score>=r[0]&&score<=r[1])return g;}return 'C';}
function gC(g){return{'A++':'#C9A84C','A+':'#E8C97A','A':'#F0883E','B++':'#58A6FF','B+':'#79B8FF','B':'#8B949E','C':'#E05C5C'}[g]||'#8B949E';}

function rawOf(sub){
  if(sub==='chinese')return parseInt(document.getElementById('chi_c')?.value)||0;
  if(sub==='math')return(parseInt(document.getElementById('mat_s')?.value)||0)+(parseFloat(document.getElementById('mat_o')?.value)||0);
  if(sub==='english'){const r=parseInt(document.getElementById('eng_r')?.value)||0,l=parseInt(document.getElementById('eng_l')?.value)||0;return(l/21)*20+(r/43)*80;}
  if(sub==='social')return parseInt(document.getElementById('soc_c')?.value)||0;
  if(sub==='science')return parseInt(document.getElementById('sci_c')?.value)||0;
}
const MAXMAP={chinese:42,math:31,english:100,social:54,science:50};

function liveG(sub){
  const raw=rawOf(sub),grade=getG(sub,raw),col=gC(grade);
  const rate=sub==='english'?raw.toFixed(1):(raw/MAXMAP[sub]*100).toFixed(1);
  const el=document.getElementById(`g-${sub}`);
  if(el)el.innerHTML=`<span class="grade-badge" style="background:${col}22;color:${col};border:1px solid ${col}44">等級：${grade}　答對率 ${rate}%</span>`;
}

function getW(k){return[...(W[k]||[])].sort((a,b)=>a-b);}

async function saveSub(sub){
  let data={};
  if(sub==='chinese')data={correct:parseInt(document.getElementById('chi_c').value)||0,wrong:getW('chinese')};
  else if(sub==='math')data={sel:parseInt(document.getElementById('mat_s').value)||0,open:parseFloat(document.getElementById('mat_o').value)||0,wrong:getW('math')};
  else if(sub==='english')data={read:parseInt(document.getElementById('eng_r').value)||0,listen:parseInt(document.getElementById('eng_l').value)||0,readWrong:getW('engRead'),listenWrong:getW('engListen')};
  else if(sub==='social')data={correct:parseInt(document.getElementById('soc_c').value)||0,wrong:getW('social')};
  else if(sub==='science')data={correct:parseInt(document.getElementById('sci_c').value)||0,wrong:getW('science')};
  try{
    const r=await apiCall({action:'saveScore',id:CU.id,subject:sub,data:JSON.stringify(data)});
    if(r.success){CS[sub]=data;liveG(sub);renderOverview();renderAnalysis();toast('✅ 儲存成功');}
    else toast('儲存失敗',true);
  }catch(e){toast('連線失敗',true);}
}

function renderOverview(){
  const subs=[{k:'chinese',l:'國文',i:'📖'},{k:'math',l:'數學',i:'🔢'},{k:'english',l:'英文',i:'🌐'},{k:'social',l:'社會',i:'🌏'},{k:'science',l:'自然',i:'🔬'}];
  let html='',grades=[],allF=true;
  for(const s of subs){
    const sc=CS[s.k];
    if(!sc){allF=false;html+=`<div class="stat-card"><div class="stat-lbl">${s.i} ${s.l}</div><div class="stat-val" style="color:var(--muted)">–</div><div class="stat-info">尚未輸入</div></div>`;continue;}
    let raw,info,grade;
    if(s.k==='chinese'){raw=sc.correct;info=`${raw}/42　${(raw/42*100).toFixed(1)}%`;grade=getG('chinese',raw);}
    else if(s.k==='math'){raw=(sc.sel||0)+(sc.open||0);info=`${raw}/31　${(raw/31*100).toFixed(1)}%`;grade=getG('math',raw);}
    else if(s.k==='english'){raw=((sc.listen||0)/21*20+(sc.read||0)/43*80);info=`加權${raw.toFixed(1)}`;grade=getG('english',raw);}
    else if(s.k==='social'){raw=sc.correct;info=`${raw}/54　${(raw/54*100).toFixed(1)}%`;grade=getG('social',raw);}
    else if(s.k==='science'){raw=sc.correct;info=`${raw}/50　${(raw/50*100).toFixed(1)}%`;grade=getG('science',raw);}
    grades.push({l:s.l,grade,info});
    const col=gC(grade);
    html+=`<div class="stat-card"><div class="stat-lbl">${s.i} ${s.l}</div><div class="stat-val" style="color:${col}">${grade}</div><div class="stat-info">${info}</div></div>`;
  }
  document.getElementById('overviewGrid').innerHTML=html||'<div style="color:var(--muted);font-size:14px;grid-column:1/-1;padding:16px 0;text-align:center">尚未輸入成績</div>';
  if(grades.length>0){
    document.getElementById('summaryTbl').innerHTML='<thead><tr><th style="padding:8px 12px;font-size:11px;color:var(--muted)">科目</th><th style="padding:8px 12px;font-size:11px;color:var(--muted)">等級</th><th style="padding:8px 12px;font-size:11px;color:var(--muted)">成績</th></tr></thead><tbody>'+grades.map(g=>`<tr><td style="padding:8px 12px;font-size:13px">${g.l}</td><td style="padding:8px 12px"><span style="color:${gC(g.grade)};font-weight:700">${g.grade}</span></td><td style="padding:8px 12px;font-size:12px;color:var(--muted)">${g.info}</td></tr>`).join('')+'</tbody>';
    if(allF){const s=[...grades].sort((a,b)=>['A++','A+','A','B++','B+','B','C'].indexOf(a.grade)-['A++','A+','A','B++','B+','B','C'].indexOf(b.grade));document.getElementById('topGrade').textContent=s[0].grade;document.getElementById('topSub').textContent='最高等級　五科皆已完成';}
    else document.getElementById('topSub').textContent=`已完成 ${grades.length}/5 科`;
  }
  drawR();
}

function drawR(){
  const d=[CS.chinese?CS.chinese.correct/42*100:0,CS.math?((CS.math.sel||0)+(CS.math.open||0))/31*100:0,CS.english?((CS.english.listen||0)/21*20+(CS.english.read||0)/43*80):0,CS.social?CS.social.correct/54*100:0,CS.science?CS.science.correct/50*100:0];
  const ctx=document.getElementById('radarChart').getContext('2d');
  if(RC)RC.destroy();
  RC=new Chart(ctx,{type:'radar',data:{labels:['國文','數學','英文','社會','自然'],datasets:[{label:'答對率(%)',data:d,backgroundColor:'rgba(201,168,76,.15)',borderColor:'rgba(201,168,76,.8)',pointBackgroundColor:'rgba(201,168,76,1)',pointRadius:5,borderWidth:2}]},options:{responsive:false,scales:{r:{min:0,max:100,ticks:{color:'#8B949E',font:{size:10},stepSize:20},grid:{color:'rgba(48,54,61,.8)'},angleLines:{color:'rgba(48,54,61,.8)'},pointLabels:{color:'#E6EDF3',font:{size:13,family:"'Noto Sans TC'"}}}},plugins:{legend:{display:false}}}});
}

function auUnits(wrongNums,map){const uc={};for(const n of wrongNums){const q=map[n];if(!q)continue;const k=q.u+'|'+q.t;if(!uc[k])uc[k]={u:q.u,t:q.t,b:q.b,qs:[],c:0};uc[k].qs.push(n);uc[k].c++;}return Object.values(uc).sort((a,b)=>b.c-a.c);}

function renderAnalysis(){
  const si=[{k:'chinese',l:'國文',rate:s=>s.correct/42*100,disp:s=>`${s.correct}/42`,raw:s=>s.correct},{k:'math',l:'數學',rate:s=>((s.sel||0)+(s.open||0))/31*100,disp:s=>`${(s.sel||0)+(s.open||0)}/31`,raw:s=>(s.sel||0)+(s.open||0)},{k:'english',l:'英文',rate:s=>((s.listen||0)/21*20+(s.read||0)/43*80),disp:s=>`閱${s.read}/43 聽${s.listen}/21`,raw:s=>((s.listen||0)/21*20+(s.read||0)/43*80)},{k:'social',l:'社會',rate:s=>s.correct/54*100,disp:s=>`${s.correct}/54`,raw:s=>s.correct},{k:'science',l:'自然',rate:s=>s.correct/50*100,disp:s=>`${s.correct}/50`,raw:s=>s.correct}];
  const rows=[];for(const s of si){const sc=CS[s.k];if(!sc)continue;rows.push({l:s.l,rate:s.rate(sc),disp:s.disp(sc),grade:getG(s.k,s.raw(sc)),k:s.k});}
  document.getElementById('detailBody').innerHTML=rows.map(r=>{const col=gC(r.grade),pct=Math.min(100,r.rate),bar=r.rate>=75?'#3FB950':r.rate>=50?'#C9A84C':'#E05C5C';return`<tr><td><strong>${r.l}</strong></td><td>${r.disp}</td><td>${r.rate.toFixed(1)}%</td><td><span style="color:${col};font-weight:700">${r.grade}</span></td><td><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${bar}"></div></div></td></tr>`;}).join('');
  const sg={國文:'建議複習字音字形、文意理解與閱讀測驗技巧',數學:'建議加強代數運算、幾何概念與統計圖表判讀',英文:'建議多練習閱讀理解與聽力辨別，增加單字量',社會:'建議重新複習地理、歷史與公民的核心概念',自然:'建議複習物理、化學、生物、地科基本原理'};
  const srtd=[...rows].sort((a,b)=>a.rate-b.rate).slice(0,3);
  document.getElementById('weakList').innerHTML=srtd.length?srtd.map((w,i)=>{const col=w.rate<50?'var(--red)':w.rate<70?'var(--orange)':'var(--gold)';return`<div class="weak-item" style="border-left-color:${col}"><div class="weak-num">${i+1}</div><div class="weak-body"><h4>${w.l}　<span style="color:${gC(w.grade)}">${w.grade}</span></h4><p>${sg[w.l]}</p><div class="wr" style="color:${col}">答對率 ${w.rate.toFixed(1)}%</div></div></div>`;}).join(''):'<div style="color:var(--muted);font-size:14px;padding:16px 0;text-align:center">請先輸入成績</div>';
  const parts=[{l:'📖 國文',k:'chinese',gW:s=>s.wrong||[],map:QM.chinese},{l:'🔢 數學',k:'math',gW:s=>s.wrong||[],map:QM.math},{l:'🌐 英文（閱讀）',k:'english',gW:s=>s.readWrong||[],map:QM.engRead},{l:'🌐 英文（聽力）',k:'english',gW:s=>s.listenWrong||[],map:QM.engListen},{l:'🌏 社會',k:'social',gW:s=>s.wrong||[],map:QM.social},{l:'🔬 自然',k:'science',gW:s=>s.wrong||[],map:QM.science}];
  let uh='';
  for(const p of parts){const sc=CS[p.k];if(!sc)continue;const w=p.gW(sc);if(!w.length)continue;const units=auUnits(w,p.map);if(!units.length)continue;
    uh+=`<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">${p.l}　<span style="font-size:11px;color:var(--red);font-weight:400">錯誤題號：第 ${w.join('、')} 題</span></div>`;
    uh+=units.slice(0,5).map(u=>`<div class="unit-item"><div class="unit-cnt">${u.c}</div><div class="unit-info"><h5>${u.u}｜${u.t}</h5><p>📚 ${u.b}</p><div class="unit-qs">相關錯題：第 ${u.qs.join('、')} 題</div></div></div>`).join('');
    uh+='</div>';
  }
  document.getElementById('unitList').innerHTML=uh||'<div style="color:var(--muted);font-size:14px;padding:16px 0;text-align:center">點選答錯題號後自動分析弱點單元</div>';
}

function toast(msg,isE=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isE?' err':'');setTimeout(()=>t.className='toast',3000);}
</script>
</body>
</html>
